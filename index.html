<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2f6db5">
<title>TOEIC Part 5 トレーニング｜1日10分</title>
<style>
  :root{
    --ink:#1d2733; --sub:#5b6b7b; --line:#dde4ee; --accent:#2f6db5; --accent-d:#245a99;
    --bg:#eef2f8; --card:#ffffff;
    --ok:#1f9d57; --ok-bg:#e7f7ee; --ng:#d8483f; --ng-bg:#fdeceb;
    --chip:#eaf1fb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{font-size:18px;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.7;
    min-height:100vh; -webkit-text-size-adjust:100%;
  }
  .app{max-width:720px; margin:0 auto; padding:0 18px 48px; min-height:100vh;}

  .topbar{position:sticky; top:0; z-index:5; background:var(--bg); padding:14px 2px 8px; display:flex; align-items:center; gap:10px;}
  .topbar h1{font-size:1.05rem; margin:0; flex:1;}
  .topbar .small{font-size:.8rem; color:var(--sub); font-weight:400;}
  .btn-back{background:none; border:none; color:var(--accent); font-size:.95rem; padding:6px 4px; cursor:pointer; font-weight:600;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin:12px 0; box-shadow:0 1px 3px rgba(30,50,80,.05);}

  .hero{background:linear-gradient(135deg,var(--accent),#5a93d4); color:#fff; border-radius:18px; padding:22px 20px; margin:8px 0 4px;}
  .hero h2{margin:0 0 4px; font-size:1.35rem;}
  .hero p{margin:0; opacity:.92; font-size:.92rem;}

  .genre-h{margin:22px 2px 2px; padding-top:4px;}
  .genre-h .gname{font-weight:800; font-size:1.05rem;}
  .genre-h .gsub{display:block; font-size:.78rem; color:var(--sub);}

  .set-list{display:flex; flex-direction:column; gap:9px; margin-top:6px;}
  .set-btn{display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 16px; cursor:pointer; font:inherit; color:inherit; transition:transform .05s;}
  .set-btn:active{transform:scale(.985);}
  .set-num{flex:none; width:40px; height:40px; border-radius:11px; background:var(--chip); color:var(--accent-d); font-weight:800; display:flex; align-items:center; justify-content:center; font-size:1rem;}
  .set-meta{flex:1; min-width:0;}
  .set-title{font-weight:700; font-size:.97rem;}
  .set-sub{font-size:.8rem; color:var(--sub);}
  .badge{flex:none; font-size:.76rem; font-weight:700; color:var(--ok); background:var(--ok-bg); border-radius:999px; padding:3px 10px;}
  .badge.none{color:var(--sub); background:#f0f3f8;}
  .random-btn{width:100%; margin-top:14px; background:var(--accent); color:#fff; border:none; border-radius:14px; padding:15px; font-size:1rem; font-weight:700; cursor:pointer;}
  .random-btn:active{background:var(--accent-d);}

  .qmeta{display:flex; align-items:center; justify-content:space-between; font-size:.85rem; color:var(--sub); margin:2px 2px 6px;}
  .qmeta .timer{font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink);}
  .progress{height:7px; background:#e0e7f1; border-radius:999px; overflow:hidden; margin:0 2px 14px;}
  .progress > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}

  .chip{display:inline-block; font-size:.74rem; font-weight:700; color:var(--accent-d); background:var(--chip); border-radius:999px; padding:3px 11px; margin-bottom:10px;}
  .q-text{font-size:1.3rem; line-height:1.9; margin:2px 0 4px; font-weight:500;}
  .q-text .blank{color:var(--accent); font-weight:800; letter-spacing:1px;}

  .choices{display:flex; flex-direction:column; gap:9px; margin-top:14px;}
  .choice{display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left; background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:15px 17px; cursor:pointer; font:inherit; color:inherit; font-size:1.12rem; transition:border-color .12s, background .12s;}
  .choice:hover{border-color:var(--accent);}
  .choice:active{background:#f6f9fd;}
  .choice .lab{flex:none; width:26px; height:26px; border-radius:7px; background:#eef2f8; color:var(--sub); font-weight:800; font-size:.9rem; display:flex; align-items:center; justify-content:center;}
  .choice.correct{border-color:var(--ok); background:var(--ok-bg);}
  .choice.correct .lab{background:var(--ok); color:#fff;}
  .choice.wrong{border-color:var(--ng); background:var(--ng-bg);}
  .choice.wrong .lab{background:var(--ng); color:#fff;}
  .choice.dim{opacity:.55;}
  .choice[disabled]{cursor:default;}

  .explain{margin-top:14px; border-radius:12px; padding:13px 15px; font-size:.93rem; border:1px solid var(--line); background:#f7faff; display:none;}
  .explain.show{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:none;}}
  .explain .verdict{font-weight:800; margin-bottom:4px;}
  .explain .verdict.ok{color:var(--ok);}
  .explain .verdict.ng{color:var(--ng);}
  .explain .ans-line{font-size:.88rem; color:var(--sub); margin-bottom:6px;}
  .explain .ans-line b{color:var(--ink);}
  .explain .point{margin-bottom:4px;}

  .cdetail{margin-top:12px; border-top:1px dashed var(--line); padding-top:10px;}
  .cdetail .cdh{font-weight:800; font-size:.84rem; color:var(--sub); margin-bottom:4px;}
  .cdrow{display:flex; gap:9px; padding:7px 0; align-items:flex-start;}
  .cdrow + .cdrow{border-top:1px solid #eef2f7;}
  .cdrow.isans{background:#f0faf4; border-radius:9px; padding:8px 9px; margin:2px -9px;}
  .cdlab{flex:none; width:22px; height:22px; border-radius:6px; background:#eef2f8; color:#5b6b7b; font-weight:800; font-size:.78rem; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .cdrow.isans .cdlab{background:var(--ok); color:#fff;}
  .cdword{font-weight:700;}
  .okmark{color:var(--ok); font-size:.76rem; font-weight:800; margin-left:4px;}
  .cdtext{font-size:.86rem; color:#33414f; display:block;}

  .next-btn{width:100%; margin-top:14px; background:var(--accent); color:#fff; border:none; border-radius:13px; padding:15px; font-size:1.02rem; font-weight:700; cursor:pointer; display:none;}
  .next-btn.show{display:block;}
  .next-btn:active{background:var(--accent-d);}

  .score-ring{text-align:center; padding:8px 0 4px;}
  .score-big{font-size:3.2rem; font-weight:800; color:var(--accent); line-height:1.1;}
  .score-big .denom{font-size:1.4rem; color:var(--sub); font-weight:700;}
  .score-msg{font-size:1.05rem; font-weight:700; margin-top:4px;}
  .score-time{color:var(--sub); font-size:.88rem;}
  .review-h{font-weight:800; margin:18px 2px 6px; font-size:.98rem;}
  .review-item{border-top:1px solid var(--line); padding:13px 2px;}
  .review-item .rq{font-size:.95rem;}
  .review-item .ra{font-size:.86rem; color:var(--sub); margin-top:3px;}
  .review-item .ra b{color:var(--ok);}
  .result-actions{display:flex; gap:10px; margin-top:18px;}
  .result-actions button{flex:1; border:none; border-radius:13px; padding:14px; font-size:1rem; font-weight:700; cursor:pointer;}
  .ra-retry{background:var(--accent); color:#fff;}
  .ra-home{background:#e7edf6; color:var(--accent-d);}

  .stat-row{display:flex; gap:10px;}
  .stat{flex:1; text-align:center; background:var(--chip); border-radius:12px; padding:12px 6px;}
  .stat .v{font-size:1.5rem; font-weight:800; color:var(--accent-d); line-height:1.1;}
  .stat .l{font-size:.74rem; color:var(--sub);}
  .cat-h{font-weight:800; font-size:.95rem; margin:18px 2px 8px;}
  .cat-bar{margin:8px 2px;}
  .cat-bar .ctop{display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:3px;}
  .cat-bar .ctop b{font-weight:700;}
  .cat-bar .track{height:9px; background:#e6ecf4; border-radius:999px; overflow:hidden;}
  .cat-bar .track > i{display:block; height:100%; border-radius:999px;}
  .hist-h{font-weight:800; font-size:.95rem; margin:20px 2px 6px;}
  details.hist{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px 14px; margin:9px 0;}
  details.hist summary{list-style:none; cursor:pointer; padding:9px 0; display:flex; align-items:center; gap:10px;}
  details.hist summary::-webkit-details-marker{display:none;}
  .hist-date{font-size:.8rem; color:var(--sub); flex:none; width:88px; font-variant-numeric:tabular-nums;}
  .hist-title{flex:1; font-size:.88rem; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hist-score{flex:none; font-weight:800; color:var(--accent-d);}
  .hist-detail{border-top:1px dashed var(--line); padding:10px 0; font-size:.88rem;}
  .hist-detail .wq{margin:8px 0;}
  .hist-detail .wq .ra{color:var(--sub); font-size:.85rem;}
  .hist-detail .wq .ra b{color:var(--ok);}
  .empty{color:var(--sub); text-align:center; padding:30px 10px;}

  footer{text-align:center; color:var(--sub); font-size:.78rem; margin-top:26px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">

  <section id="home">
    <div class="topbar"><h1>TOEIC <span class="small">Part 5 トレーニング</span></h1></div>
    <div class="hero">
      <h2>1日10分・10問</h2>
      <p>短文穴埋め（Part 5）を毎日1セット。各ジャンル3セット・全150問＋詳しい解説つき。</p>
    </div>
    <div class="set-list" id="setList"></div>
    <button class="random-btn" id="randomBtn">🔀 ランダム10問（応用・別問題）</button>
    <button class="random-btn" id="vocabBtn" style="background:#2f7a34; margin-top:10px;">📚 単語・熟語トレーニング</button>
    <button class="random-btn" id="recordsBtn" style="background:#e7edf6; color:#245a99; margin-top:10px;">📊 学習の記録を見る</button>
    <footer>文法150問＋ランダム20問／単語・熟語つき／記録はこの端末に保存されます</footer>
  </section>

  <section id="vocabMenu" class="hidden">
    <div class="topbar"><button class="btn-back" id="vmBack">← ホーム</button><h1>単語・熟語</h1></div>
    <div class="hero"><h2>単語・熟語トレーニング</h2><p>英単語・熟語の意味を4択で答える1問1答。レベル別に出題します。</p></div>
    <div id="vmList" class="set-list"></div>
    <footer>レベルを選ぶと、その語彙からランダムに出題されます。何度でも挑戦できます。</footer>
  </section>

  <section id="quiz" class="hidden">
    <div class="topbar"><button class="btn-back" id="quitBtn">← やめる</button><h1 id="quizTitle" style="font-size:.98rem;"></h1></div>
    <div class="qmeta"><span id="qCount"></span><span class="timer" id="timer">00:00</span></div>
    <div class="progress"><i id="progBar"></i></div>
    <div class="card">
      <span class="chip" id="qChip"></span>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choices"></div>
      <div class="explain" id="explain"></div>
    </div>
    <button class="next-btn" id="nextBtn">次へ →</button>
  </section>

  <section id="records" class="hidden">
    <div class="topbar"><button class="btn-back" id="recBack">← ホーム</button><h1>学習の記録</h1></div>
    <div id="recBody"></div>
    <div class="result-actions" id="recActions">
      <button class="ra-home" id="recCopy">📋 記録をコピー</button>
      <button class="ra-home" id="recClear" style="background:#fdeceb; color:#d8483f;">記録を消去</button>
    </div>
  </section>

  <section id="result" class="hidden">
    <div class="topbar"><h1>結果</h1></div>
    <div class="card">
      <div class="score-ring">
        <div class="score-big"><span id="scoreNum">0</span><span class="denom"> / <span id="scoreDen">10</span></span></div>
        <div class="score-msg" id="scoreMsg"></div>
        <div class="score-time" id="scoreTime"></div>
      </div>
    </div>
    <div id="reviewArea"></div>
    <div class="result-actions">
      <button class="ra-retry" id="retryBtn">もう一度</button>
      <button class="ra-home" id="homeBtn">ホームへ</button>
    </div>
  </section>

</div>

<script>
/* =========================================================
   問題データ
   item: {q, c:[4選択肢], a:正解index, cat:分類,
          e:要点解説, d:[各選択肢の意味・用法・例文 ×4]}
   ========================================================= */

/* ----- ランダム10問 専用プール（ジャンル別とは別問題・全20問）----- */
const RANDOM_POOL = [
  {q:"The CEO emphasized the ____ of teamwork during her speech.",c:["important","importantly","importance","importing"],a:2,cat:"品詞",
   e:"the ____ of ～ の形なので名詞 importance が入る。",
   d:["important（形容詞）重要な：名詞を修飾。例) an important meeting（重要な会議）",
      "importantly（副詞）重要なことに：例) More importantly, it works.（さらに重要なのは、それが機能することだ）",
      "importance（名詞）重要性：the ___ of ～ で名詞が必要。例) the importance of sleep（睡眠の重要性）→正解",
      "importing（動名詞）輸入すること：動詞 import 由来で意味が合わない。例) importing goods（商品を輸入すること）"]},
  {q:"Visitors are required to wear identification badges ____ they are in the building.",c:["while","during","despite","because of"],a:0,cat:"接続詞",
   e:"後ろが文(they are ...)なので接続詞 while が必要。",
   d:["while（接続詞）～する間：後ろは文。例) Read while you wait.（待つ間に読む）→正解",
      "during（前置詞）～の間：後ろは名詞。例) during the meeting（会議の間）",
      "despite（前置詞）～にもかかわらず：後ろは名詞。例) despite the rain（雨にもかかわらず）",
      "because of（前置詞句）～が理由で：後ろは名詞。例) because of the delay（遅れのせいで）"]},
  {q:"The technician will ____ the equipment before the demonstration.",c:["inspect","inspection","inspecting","inspector"],a:0,cat:"動詞",
   e:"助動詞 will の後ろは動詞の原形。inspect が入る。",
   d:["inspect（動詞）点検する：will の後は原形。例) inspect the car（車を点検する）→正解",
      "inspection（名詞）点検：例) a safety inspection（安全点検）",
      "inspecting（動名詞・分詞）点検すること：will の後には置けない。例) after inspecting it",
      "inspector（名詞）検査官：人を指す。例) a health inspector（衛生検査官）"]},
  {q:"____ of the employees has access to the confidential files.",c:["Few","Many","None","Several"],a:2,cat:"代名詞",
   e:"動詞が単数 has なので、of+複数で単数扱いもできる None が正解。",
   d:["Few（ほとんど～ない）：複数扱いで have を取る。例) Few were present.（出席者はわずか）",
      "Many（多くの）：複数扱い。例) Many have left.（多くが去った）",
      "None（誰も～ない）：None of+複数は単数 has も可。例) None of them is ready. →正解",
      "Several（数人の）：複数扱い。例) Several were chosen.（数名が選ばれた）"]},
  {q:"The merger resulted ____ a significant increase in revenue.",c:["in","on","to","from"],a:0,cat:"語彙",
   e:"result in ～「～という結果になる」。結果を導く前置詞 in。",
   d:["in：result in ～「～という結果に終わる」結果を導く。例) resulted in delays（遅延を招いた）→正解",
      "on：result on という語法はない",
      "to：result to は誤り（lead to ～なら正しい）",
      "from：result from ～は「～が原因で生じる」原因を導く。例) Delays resulted from the error.（逆の関係）"]},
  {q:"The new model is far more efficient than the ____ one.",c:["previous","previously","previousness","prevail"],a:0,cat:"品詞",
   e:"名詞 one を前から修飾する形容詞 previous。",
   d:["previous（形容詞）以前の：名詞を修飾。例) the previous version（以前の版）→正解",
      "previously（副詞）以前に：例) previously announced（以前発表された）",
      "previousness：通常使われない語形",
      "prevail（動詞）勝つ・普及する：例) Justice will prevail.（正義は勝つ）"]},
  {q:"Employees who work overtime will be compensated ____.",c:["accord","according","accordingly","accordance"],a:2,cat:"品詞",
   e:"文末で動詞 compensated を修飾する副詞 accordingly。",
   d:["accord（名詞・動詞）一致／合致する：例) in accord with ～（～と一致して）",
      "according：according to ～「～によれば」の形で使う。例) according to the report",
      "accordingly（副詞）それに応じて：例) Plan accordingly.（それに応じて計画する）→正解",
      "accordance：in accordance with ～「～に従って」の形でのみ。例) in accordance with the rules"]},
  {q:"The proposal was rejected ____ its high cost.",c:["due to","because","although","so"],a:0,cat:"前置詞",
   e:"後ろが名詞句(its high cost)なので前置詞句 due to。",
   d:["due to（前置詞句）～が理由で：後ろは名詞。例) due to bad weather（悪天候のため）→正解",
      "because（接続詞）～なので：後ろは文。例) because it rained（雨が降ったので）",
      "although（接続詞）～だが：後ろは文。例) although it was late",
      "so（接続詞）だから：節と節をつなぐ。例) It rained, so we stayed."]},
  {q:"The manager, along with her assistants, ____ attending the seminar.",c:["are","is","were","have"],a:1,cat:"数の一致",
   e:"主語の核は単数 manager。along with ～ は数に影響しないので is。",
   d:["are（be動詞・複数現在）：複数主語に対応。主語は単数なので不可",
      "is（be動詞・単数現在）：主語 manager は単数。along with ～ は付け足し。例) The boss is here. →正解",
      "were（be動詞・複数過去）：数も時制も合わない",
      "have（持つ／完了の助動詞）：be動詞が必要な文脈で不適"]},
  {q:"We are looking forward to ____ from you soon.",c:["hear","hearing","heard","hears"],a:1,cat:"語法",
   e:"look forward to の to は前置詞。後ろは動名詞 hearing。",
   d:["hear（動詞・原形）聞く：to が前置詞なので原形は不可",
      "hearing（動名詞）聞くこと：look forward to + 動名詞。例) look forward to seeing you →正解",
      "heard（過去・過去分詞）：この形では入らない",
      "hears（3人称単数現在）：入らない"]},
  {q:"The store offers a refund to ____ is not satisfied with the product.",c:["whoever","whomever","whose","which"],a:0,cat:"関係詞",
   e:"後ろの動詞 is の主語になる主格の whoever。",
   d:["whoever（複合関係代名詞・主格）～する人は誰でも：後ろの is の主語。例) Whoever wins gets a prize. →正解",
      "whomever（目的格）：目的語が必要な場面で使う。ここは主語が必要で不可",
      "whose（所有格）誰の：後ろに名詞が必要",
      "which（どれ・もの）：人には通常使わない"]},
  {q:"The construction project is expected to be completed ____ schedule.",c:["ahead of","in front of","on top of","instead of"],a:0,cat:"語彙",
   e:"ahead of schedule「予定より早く」という定型。",
   d:["ahead of（～より先んじて）：ahead of schedule「予定より早く」。例) finished ahead of schedule →正解",
      "in front of（～の前に）：位置を表す。例) in front of the door（ドアの前に）",
      "on top of（～の上に・加えて）：例) on top of that（その上）",
      "instead of（～の代わりに）：例) tea instead of coffee（コーヒーの代わりに紅茶）"]},
  {q:"Mr. Yamada has been with the company ____ 2010.",c:["for","since","from","in"],a:1,cat:"前置詞",
   e:"現在完了＋時の起点（2010）には since。",
   d:["for（～の間）：期間に使う。例) for ten years（10年間）",
      "since（～以来）：現在完了＋起点の一点。例) since 2010 →正解",
      "from（～から）：起点だが完了形の継続には since を使う。例) from Monday to Friday",
      "in（～に）：年・月など一点。例) in 2010（2010年に）継続の意味は出ない"]},
  {q:"The instructions must be followed ____ to avoid accidents.",c:["exact","exactly","exactness","exacting"],a:1,cat:"品詞",
   e:"動詞 followed を修飾する副詞 exactly。",
   d:["exact（形容詞）正確な：名詞を修飾。例) the exact time（正確な時刻）",

/* ===================== アプリ本体 ===================== */
const $ = s => document.querySelector(s);
const LETTERS = ["A","B","C","D"];
let state = null;
let timerInt = null;

/* localStorage */
function bestKey(id){ return "toeic_p5_best_"+id; }
function getBest(id){ const v=localStorage.getItem(bestKey(id)); return v===null?null:parseInt(v,10); }
function setBest(id,score){ const b=getBest(id); if(b===null||score>b) localStorage.setItem(bestKey(id),score); }
const HIST_KEY="toeic_p5_history";
function getHistory(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||"[]"); }catch(e){ return []; } }
function saveHistory(h){ localStorage.setItem(HIST_KEY, JSON.stringify(h)); }
function fmtDate(ms){ const d=new Date(ms), p=n=>String(n).padStart(2,"0"); return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function fmtSecs(s){ return `${Math.floor(s/60)}分${s%60}秒`; }

function show(sec){ ["home","quiz","records","result","vocabMenu"].forEach(s=>$("#"+s).classList.toggle("hidden", s!==sec)); window.scrollTo(0,0); }

/* ホーム */
const GCOLORS=["#2f6db5","#1f9d7a","#e08a1e","#7b5ea7","#d65a7a"]; // ジャンル別の色
function renderHome(){
  const list=$("#setList"); list.innerHTML="";
  GENRES.forEach((gen,gi)=>{
    const col=GCOLORS[gi%GCOLORS.length];
    const gh=document.createElement("div"); gh.className="genre-h";
    gh.style.borderLeft="6px solid "+col; gh.style.paddingLeft="12px";
    gh.innerHTML=`<span class="gname" style="color:${col}">${escapeHtml(gen.g)}</span><span class="gsub">${escapeHtml(gen.sub)}</span>`;
    list.appendChild(gh);
    gen.sets.forEach((set,si)=>{
      const id=gi+"-"+si, best=getBest(id), title=gen.g+" "+(si+1)+"/"+gen.sets.length;
      const b=document.createElement("button"); b.className="set-btn";
      b.style.borderLeft="5px solid "+col;
      b.innerHTML=`<span class="set-num" style="background:${col}1f; color:${col}">${si+1}</span>
        <span class="set-meta"><span class="set-title">セット${si+1}</span>
        <span class="set-sub">全${set.items.length}問</span></span>
        <span class="badge ${best===null?'none':''}">${best===null?'未挑戦':'最高 '+best+'/'+set.items.length}</span>`;
      b.onclick=()=>startSetQuiz(set.items, title, id);
      list.appendChild(b);
    });
  });
}
function startSetQuiz(items,title,id){ startQuiz(items.slice(), title, ()=>startSetQuiz(items,title,id), id); }
function startRandomQuiz(){ startQuiz(randomSet(), "ランダム10問", startRandomQuiz, null); }

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function randomSet(){ return shuffle(RANDOM_POOL.slice()).slice(0,10); }

/* 単語・熟語 */
function renderVocabMenu(){
  const list=$("#vmList"); list.innerHTML="";
  const groups=[
    {label:"英単語", sub:"英単語の意味を4択で答える", type:"word", data:WORDS, color:"#2f7a34"},
    {label:"英熟語", sub:"イディオムの意味を4択で答える", type:"idiom", data:IDIOMS, color:"#b06a2c"}
  ];
  const levels=["400","500","600"];
  groups.forEach(g=>{
    const col=g.color;
    const gh=document.createElement("div"); gh.className="genre-h";
    gh.style.borderLeft="6px solid "+col; gh.style.paddingLeft="12px";
    gh.innerHTML=`<span class="gname" style="color:${col}">${g.label}</span><span class="gsub">${g.sub}</span>`;
    list.appendChild(gh);
    levels.forEach(lv=>{
      const pool=g.data["l"+lv]||[];
      const b=document.createElement("button"); b.className="set-btn";
      b.style.borderLeft="5px solid "+col;
      b.innerHTML=`<span class="set-num" style="background:${col}1f; color:${col}; font-size:.92rem;">${lv}</span>
        <span class="set-meta"><span class="set-title">${lv}点レベル</span>
        <span class="set-sub">全${pool.length}${g.type==='word'?'語':'熟語'}から出題</span></span>
        <span class="badge none">▶ 開始</span>`;
      b.onclick=()=>startVocab(lv, g.type);
      list.appendChild(b);
    });
  });
}
function makeVocabItem(entry, pool, cat){
  const others=shuffle(pool.filter(x=>x.m!==entry.m));
  const ds=[]; const seen=new Set([entry.m]);
  for(const o of others){ if(ds.length>=3) break; if(!seen.has(o.m)){ ds.push(o); seen.add(o.m); } }
  const all=shuffle([entry, ...ds]);          // 各選択肢の出題元（英語＋意味）を保持
  const choices=all.map(x=>x.m);
  const d=all.map(x=>x.w);                     // d[i] = 選択肢iの意味に対応する英単語
  return {q:entry.w, c:choices, a:all.indexOf(entry), cat, e:`${entry.w} ＝ ${entry.m}`, voc:true, d};
}
function startVocab(level, type){
  const data=(type==='word'?WORDS:IDIOMS)["l"+level];
  const cat=(type==='word'?'単語':'熟語')+'・'+level;
  const N=Math.min(type==='word'?20:15, data.length);
  const picked=shuffle(data.slice()).slice(0,N);
  const items=picked.map(e=>makeVocabItem(e,data,cat));
  const title=(type==='word'?'英単語':'英熟語')+' '+level+'点レベル';
  startQuiz(items, title, ()=>startVocab(level,type), null);
}

/* クイズ */
function startQuiz(items, title, retryFn, setId){
  state={ items, idx:0, answers:new Array(items.length).fill(null), correct:0, startMs:Date.now(), title, retryFn, setId };
  $("#quizTitle").textContent=title; show("quiz"); startTimer(); renderQuestion();
}
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{ const s=Math.floor((Date.now()-state.startMs)/1000);
    $("#timer").textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); },500);
}

function choiceDetailHtml(it){
  if(!it.d) return "";
  const head = it.voc ? "各選択肢の英語（あわせて覚えよう）" : "選択肢の意味・使い方";
  let s=`<div class="cdetail"><div class="cdh">${head}</div>`;
  it.c.forEach((w,i)=>{
    const isans=(i===it.a);
    if(it.voc){
      // 単語問題：英単語を主役にして「英語 ＝ 意味」で表示
      s+=`<div class="cdrow ${isans?'isans':''}"><span class="cdlab">${LETTERS[i]}</span>
        <div><span class="cdword" style="font-size:1.08rem">${escapeHtml(it.d[i])}</span>${isans?'<span class="okmark">✓正解</span>':''}
        <span class="cdtext">＝ ${escapeHtml(w)}</span></div></div>`;
    } else {
      s+=`<div class="cdrow ${isans?'isans':''}"><span class="cdlab">${LETTERS[i]}</span>
        <div><span class="cdword">${escapeHtml(w)}</span>${isans?'<span class="okmark">✓正解</span>':''}
        <span class="cdtext">${escapeHtml(it.d[i])}</span></div></div>`;
    }
  });
  return s+'</div>';
}

function renderQuestion(){
  const it=state.items[state.idx];
  $("#qCount").textContent=`第 ${state.idx+1} 問 / ${state.items.length}`;
  $("#progBar").style.width=((state.idx)/state.items.length*100)+"%";
  $("#qChip").textContent=it.cat;
  if(it.voc){
    $("#qText").innerHTML=`<div style="text-align:center; padding:6px 0;">
      <span style="font-size:1.7rem; font-weight:800; letter-spacing:.5px;">${escapeHtml(it.q)}</span>
      <div style="font-size:.78rem; color:#5b6b7b; margin-top:4px; font-weight:400;">↓ 意味を選ぼう</div></div>`;
  } else {
    $("#qText").innerHTML=escapeHtml(it.q).replace("____",'<span class="blank">____</span>');
  }
  const box=$("#choices"); box.innerHTML="";
  it.c.forEach((txt,i)=>{
    const btn=document.createElement("button"); btn.className="choice";
    btn.innerHTML=`<span class="lab">${LETTERS[i]}</span><span>${escapeHtml(txt)}</span>`;
    btn.onclick=()=>pick(i,btn); box.appendChild(btn);
  });
  const ex=$("#explain"); ex.className="explain"; ex.innerHTML="";
  $("#nextBtn").className="next-btn";
  $("#nextBtn").textContent=(state.idx===state.items.length-1)?"結果を見る →":"次へ →";
}

function pick(i,btn){
  if(state.answers[state.idx]!==null) return;
  const it=state.items[state.idx];
  state.answers[state.idx]=i;
  const correct=(i===it.a); if(correct) state.correct++;
  [...$("#choices").children].forEach((b,bi)=>{
    b.disabled=true;
    if(bi===it.a) b.classList.add("correct");
    else if(bi===i) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const ex=$("#explain");
  ex.innerHTML=`<div class="verdict ${correct?'ok':'ng'}">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div class="ans-line">正解：<b>${LETTERS[it.a]}. ${escapeHtml(it.c[it.a])}</b></div>
    <div class="point">${escapeHtml(it.e)}</div>${choiceDetailHtml(it)}`;
  ex.classList.add("show");
  $("#nextBtn").classList.add("show");
  $("#nextBtn").scrollIntoView({behavior:"smooth",block:"end"});
}

$("#nextBtn").onclick=()=>{
  if(state.answers[state.idx]===null) return;
  if(state.idx<state.items.length-1){ state.idx++; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"}); }
  else finish();
};

function recordAttempt(secs){
  const cats={}, wrong=[];
  state.items.forEach((it,i)=>{
    const sel=state.answers[i], ok=(sel===it.a);
    if(!cats[it.cat]) cats[it.cat]={a:0,c:0};
    cats[it.cat].a++; if(ok) cats[it.cat].c++;
    if(!ok) wrong.push({q:it.q, sel:sel===null?'—':LETTERS[sel], ans:LETTERS[it.a], ac:it.c[it.a], e:it.e, cat:it.cat});
  });
  const h=getHistory();
  h.push({t:Date.now(), set:state.title, score:state.correct, total:state.items.length, secs, cats, wrong});
  if(h.length>300) h.splice(0,h.length-300);
  saveHistory(h);
}

function finish(){
  clearInterval(timerInt);
  const total=state.items.length, score=state.correct;
  if(state.setId) setBest(state.setId,score);
  const secs=Math.floor((Date.now()-state.startMs)/1000);
  recordAttempt(secs);
  $("#scoreNum").textContent=score; $("#scoreDen").textContent=total;
  const pct=score/total;
  $("#scoreMsg").textContent = pct===1?"満点！完璧です 🎉" : pct>=0.8?"good! あと一歩で満点" : pct>=0.5?"その調子。復習で固めよう" : "復習タイム。解説をじっくり読もう";
  $("#scoreTime").textContent=`所要時間 ${fmtSecs(secs)}`;
  const wrong=state.items.map((it,i)=>({it,sel:state.answers[i]})).filter(o=>o.sel!==o.it.a);
  const area=$("#reviewArea"); area.innerHTML="";
  if(wrong.length){
    const h=document.createElement("div"); h.className="review-h"; h.textContent=`📝 間違えた ${wrong.length} 問の復習`; area.appendChild(h);
    const card=document.createElement("div"); card.className="card"; card.style.paddingTop="4px";
    wrong.forEach(({it,sel})=>{
      const d=document.createElement("div"); d.className="review-item";
      d.innerHTML=`<div class="rq">${escapeHtml(it.q).replace("____",'<span class="blank" style="color:#2f6db5;font-weight:800">____</span>')}</div>
        <div class="ra">あなた：${sel===null?'—':LETTERS[sel]} ／ 正解：<b>${LETTERS[it.a]}. ${escapeHtml(it.c[it.a])}</b><br>${escapeHtml(it.e)}</div>
        ${choiceDetailHtml(it)}`;
      card.appendChild(d);
    });
    area.appendChild(card);
  }
  show("result");
}

/* 記録 */
function catColor(pct){ return pct>=80?'#1f9d57':pct>=60?'#2f6db5':pct>=40?'#e0a416':'#d8483f'; }
function renderRecords(){
  const hist=getHistory(), body=$("#recBody");
  if(!hist.length){ body.innerHTML=`<div class="card"><div class="empty">まだ記録がありません。<br>セットに挑戦すると、ここに日付・点数・弱点が残ります。</div></div>`; $("#recActions").style.display="none"; return; }
  $("#recActions").style.display="flex";
  let totQ=0,totC=0,totSecs=0; const agg={};
  hist.forEach(a=>{ totQ+=a.total; totC+=a.score; totSecs+=a.secs||0; for(const k in a.cats){ if(!agg[k])agg[k]={a:0,c:0}; agg[k].a+=a.cats[k].a; agg[k].c+=a.cats[k].c; } });
  const avgPct=Math.round(totC/totQ*100), totMin=Math.round(totSecs/60);
  let html=`<div class="card"><div class="stat-row">
    <div class="stat"><div class="v">${hist.length}</div><div class="l">学習回数</div></div>
    <div class="stat"><div class="v">${avgPct}%</div><div class="l">平均正答率</div></div>
    <div class="stat"><div class="v">${totMin}<span style="font-size:.9rem">分</span></div><div class="l">総学習時間</div></div></div>`;
  const cats=Object.keys(agg).map(k=>({k,pct:Math.round(agg[k].c/agg[k].a*100),n:agg[k].a,c:agg[k].c})).sort((x,y)=>x.pct-y.pct);
  html+=`<div class="cat-h">カテゴリ別 正答率（弱点が上）</div>`;
  cats.forEach(c=>{ html+=`<div class="cat-bar"><div class="ctop"><span>${escapeHtml(c.k)}</span><b style="color:${catColor(c.pct)}">${c.pct}% <span style="color:#5b6b7b;font-weight:400">(${c.c}/${c.n})</span></b></div><div class="track"><i style="width:${c.pct}%; background:${catColor(c.pct)}"></i></div></div>`; });
  html+=`</div><div class="hist-h">これまでの記録（新しい順）</div>`;
  [...hist].reverse().forEach(a=>{
    const pct=Math.round(a.score/a.total*100);
    let detail=`<div class="hist-detail">所要 ${fmtSecs(a.secs||0)}`;
    if(a.wrong && a.wrong.length){
      detail+=`<div style="margin-top:8px;font-weight:700">間違えた ${a.wrong.length} 問</div>`;
      a.wrong.forEach(w=>{ detail+=`<div class="wq">・${escapeHtml(w.q)}<div class="ra">あなた：${w.sel} ／ 正解：<b>${w.ans}. ${escapeHtml(w.ac)}</b>（${escapeHtml(w.cat)}）<br>${escapeHtml(w.e)}</div></div>`; });
    } else { detail+=`<div style="margin-top:6px;color:#1f9d57;font-weight:700">全問正解！</div>`; }
    detail+=`</div>`;
    html+=`<details class="hist"><summary><span class="hist-date">${fmtDate(a.t)}</span><span class="hist-title">${escapeHtml(a.set)}</span><span class="hist-score" style="color:${catColor(pct)}">${a.score}/${a.total}</span></summary>${detail}</details>`;
  });
  body.innerHTML=html;
}
function buildRecordText(){
  const hist=getHistory(); if(!hist.length) return "（記録なし）";
  let totQ=0,totC=0; const agg={};
  hist.forEach(a=>{ totQ+=a.total; totC+=a.score; for(const k in a.cats){ if(!agg[k])agg[k]={a:0,c:0}; agg[k].a+=a.cats[k].a; agg[k].c+=a.cats[k].c; } });
  let t=`■TOEIC Part5 学習記録\n学習回数:${hist.length}回 ／ 平均正答率:${Math.round(totC/totQ*100)}%\n\n[カテゴリ別 正答率（弱点順）]\n`;
  Object.keys(agg).map(k=>({k,pct:Math.round(agg[k].c/agg[k].a*100),n:agg[k].a,c:agg[k].c})).sort((x,y)=>x.pct-y.pct).forEach(c=>{ t+=`・${c.k}: ${c.pct}% (${c.c}/${c.n})\n`; });
  t+=`\n[履歴（新しい順）]\n`;
  [...hist].reverse().forEach(a=>{ t+=`${fmtDate(a.t)}  ${a.set}  ${a.score}/${a.total}  ${fmtSecs(a.secs||0)}\n`; });
  return t;
}
function copyRecords(){
  const txt=buildRecordText();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>alert("記録をコピーしました。\nLINEやメールに貼り付けて先生に送れます。"), ()=>window.prompt("下記を長押しでコピーしてください：", txt));
  } else { window.prompt("下記を長押しでコピーしてください：", txt); }
}
